<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="page-header mb-8">
    <h1 class="text-3xl font-bold text-secondary-900 mb-2">Image to PDF</h1>
    <p class="text-secondary-500">Combine multiple image files into a single PDF document.</p>
  </div>
  
  <div class="card p-6">
    <h3 class="font-semibold mb-4 text-lg">Select Images (JPEG/PNG)</h3>
    <input type="file" accept="image/png, image/jpeg" multiple (change)="onImages($event)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100" />
    
    <div *ngIf="images.length > 0" class="mt-4 border-t pt-4">
      <p class="text-sm font-medium text-secondary-900">{{images.length}} image(s) selected.</p>
    </div>
  </div>
  
  <button (click)="process()" [disabled]="images.length === 0 || processing" class="btn-primary mt-8 flex justify-center w-full py-4 text-lg font-medium shadow-md hover:shadow-lg">
    <span *ngIf="!processing">Convert to PDF</span>
    <span *ngIf="processing">Processing...</span>
  </button>
</div>
