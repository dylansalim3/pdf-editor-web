<div [class.dark]="darkMode" class="min-h-screen transition-colors duration-300" [ngClass]="darkMode ? 'bg-gray-900 text-white' : 'bg-secondary-50 text-gray-900'">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <app-sidebar 
      [collapsed]="sidebarCollapsed"
      (toggle)="toggleSidebar()">
    </app-sidebar>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 transition-all duration-300" [class.ml-64]="!sidebarCollapsed" [class.ml-16]="sidebarCollapsed">
      <!-- Top Navigation -->
      <header class="border-b sticky top-0 z-30 transition-colors duration-300" [ngClass]="darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-secondary-200'">
        <div class="flex items-center justify-between px-4 py-3">
          <!-- Left: Toggle & Breadcrumb -->
          <div class="flex items-center space-x-4">
            <button 
              (click)="toggleSidebar()"
              class="btn-icon lg:hidden transition-colors duration-200" [ngClass]="darkMode ? 'text-gray-300 hover:text-white' : 'text-secondary-500 hover:text-secondary-700'">
              <i nz-icon nzType="menu" nzTheme="outline" class="text-xl"></i>
            </button>
            
            <!-- Breadcrumb -->
            <nav class="hidden md:flex items-center space-x-2 text-sm">
              <ng-container *ngFor="let breadcrumb of breadcrumbs; let last = last">
                <a 
                  [routerLink]="breadcrumb.url" 
                  class="transition-colors duration-200"
                  [ngClass]="darkMode ? (last ? 'text-white font-medium' : 'text-gray-400 hover:text-gray-200') : (last ? 'text-secondary-900 font-medium' : 'text-secondary-500 hover:text-secondary-700')">
                  {{ breadcrumb.label }}
                </a>
                <span *ngIf="!last" [ngClass]="darkMode ? 'text-gray-600' : 'text-secondary-400'">/</span>
              </ng-container>
            </nav>
          </div>

          <!-- Middle: Universal Search -->
          <div class="hidden md:flex mx-4 flex-1 max-w-md">
            <div class="relative w-full">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i nz-icon nzType="search" nzTheme="outline"></i>
              </span>
              <input type="text" placeholder="Search tasks, files, tools..." 
                class="w-full pl-10 pr-4 py-2 border rounded-full text-sm focus:outline-none transition-colors duration-200"
                [ngClass]="darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-primary-500' : 'bg-gray-50 border-gray-300 text-gray-900 focus:border-primary-500 bg-white'" />
            </div>
          </div>

          <!-- Right: Actions -->
          <div class="flex items-center space-x-3">
            <!-- Upload Button -->
            <a 
              routerLink="/upload"
              class="btn-primary hidden sm:inline-flex">
              <i nz-icon nzType="upload" nzTheme="outline" class="mr-2"></i>
              Upload PDF
            </a>
            
            <!-- Dark Mode Toggle -->
            <button (click)="toggleDarkMode()" class="btn-icon transition-colors duration-200" [ngClass]="darkMode ? 'text-yellow-400 hover:text-yellow-300' : 'text-gray-500 hover:text-gray-700'">
              <i nz-icon [nzType]="darkMode ? 'sun' : 'moon'" nzTheme="outline" class="text-xl"></i>
            </button>

            <!-- User Preferences / Settings -->
            <button (click)="togglePreferences()" class="btn-icon transition-colors duration-200" [ngClass]="darkMode ? 'text-gray-300 hover:text-white' : 'text-secondary-500 hover:text-secondary-700'">
              <i nz-icon nzType="setting" nzTheme="outline" class="text-xl"></i>
            </button>

            <!-- Help Button -->
            <button class="btn-icon transition-colors duration-200" [ngClass]="darkMode ? 'text-gray-300 hover:text-white' : 'text-secondary-500 hover:text-secondary-700'">
              <i nz-icon nzType="question-circle" nzTheme="outline" class="text-xl"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Preferences Dropdown/Panel -->
      <div *ngIf="showPreferences" class="absolute right-4 top-16 w-64 rounded-lg shadow-lg border p-4 z-50 transition-colors duration-200" [ngClass]="darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'">
        <h3 class="font-bold mb-3 border-b pb-2" [ngClass]="darkMode ? 'text-white border-gray-700' : 'text-gray-900 border-gray-200'">User Preferences</h3>
        <div class="flex flex-col space-y-3 pt-2">
          <label class="flex justify-between items-center text-sm cursor-pointer" [ngClass]="darkMode ? 'text-gray-300' : 'text-gray-700'">
            <span>High Contrast Mode</span>
            <input type="checkbox" class="form-checkbox h-4 w-4 text-primary-600 rounded">
          </label>
          <label class="flex justify-between items-center text-sm cursor-pointer" [ngClass]="darkMode ? 'text-gray-300' : 'text-gray-700'">
            <span>Auto-save changes</span>
            <input type="checkbox" class="form-checkbox h-4 w-4 text-primary-600 rounded" checked>
          </label>
          <label class="flex justify-between items-center text-sm cursor-pointer" [ngClass]="darkMode ? 'text-gray-300' : 'text-gray-700'">
            <span>Enable Analytics</span>
            <input type="checkbox" class="form-checkbox h-4 w-4 text-primary-600 rounded" checked>
          </label>
        </div>
      </div>

      <!-- Main Content -->
      <main class="flex-1 overflow-auto p-6 transition-colors duration-300" [ngClass]="darkMode ? 'bg-gray-900' : 'bg-secondary-50'">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
