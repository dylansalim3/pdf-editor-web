<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="page-header mb-8">
    <h1 class="text-3xl font-bold text-secondary-900 mb-2">Compress PDF</h1>
    <p class="text-secondary-500">Reduce the file size of your PDF document without losing extreme quality.</p>
  </div>
  
  <div class="card p-6">
    <h3 class="font-semibold mb-4 text-lg">Select PDF</h3>
    <input type="file" accept=".pdf" (change)="onPdf($event)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100" />
    <p class="text-sm mt-3 font-medium text-secondary-900 truncate" *ngIf="pdfFile">Selected: {{pdfFile.name}}</p>
  </div>
  
  <button (click)="process()" [disabled]="!pdfFile || processing" class="btn-primary mt-8 flex justify-center w-full py-4 text-lg font-medium shadow-md hover:shadow-lg">
    <span *ngIf="!processing">Compress Document</span>
    <span *ngIf="processing">Compressing...</span>
  </button>
</div>
