<div class="max-w-4xl mx-auto py-10 px-4">
  <div class="page-header mb-8">
    <h1 class="text-3xl font-bold text-secondary-900 mb-2">OCR Extractor</h1>
    <p class="text-secondary-500">Extract text from scanned PDFs using Tesseract.js optical character recognition.</p>
  </div>
  
  <div class="card p-6">
    <h3 class="font-semibold mb-4 text-lg">Select PDF</h3>
    <input type="file" accept=".pdf" (change)="onPdf($event)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100" />
  </div>

  <canvas id="ocr-canvas" class="hidden"></canvas>

  <button (click)="process()" [disabled]="!pdfFile || processing" class="btn-primary mt-8 flex justify-center w-full py-4 text-lg font-medium shadow-md hover:shadow-lg">
    <span *ngIf="!processing">Run OCR</span>
    <span *ngIf="processing">Scanning Page 1... {{progress}}%</span>
  </button>

  <div *ngIf="extractedText" class="mt-8 card p-6">
    <h3 class="font-semibold mb-2 text-lg">Recognized Text</h3>
    <textarea class="w-full h-64 p-4 border rounded font-mono text-sm" readonly>{{extractedText}}</textarea>
  </div>
</div>
